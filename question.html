<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Important Question 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      font-family:'Segoe UI','Trebuchet MS',Tahoma,sans-serif;
      background:linear-gradient(170deg,#04060f 0%,#0a0e24 45%,#12183a 100%);
      overflow:hidden; position:relative;
      display:flex; align-items:center; justify-content:center;
      transition:background 1.2s ease;
    }
    body.yes-mode { background:linear-gradient(170deg,#ff80b0 0%,#ffaad0 45%,#ffd0e8 100%); }
    body.no-mode  { background:linear-gradient(170deg,#1a0000 0%,#3a0000 45%,#200000 100%); }

    .blob {
      position:absolute; border-radius:50%;
      filter:blur(60px); opacity:0.55;
      animation:drift linear infinite alternate; pointer-events:none;
      transition:background 1.2s;
    }
    .blob-1{width:420px;height:420px;top:-80px;left:-80px;background:radial-gradient(circle,#1a1060,#08063a);animation-duration:14s;}
    .blob-2{width:280px;height:280px;bottom:-60px;right:60px;background:radial-gradient(circle,#2a1050,#0e0828);animation-duration:11s;}
    .blob-3{width:180px;height:180px;top:30%;right:12%;background:radial-gradient(circle,#18306a,#0a1838);animation-duration:17s;}
    @keyframes drift{from{transform:translateY(0) scale(1);}to{transform:translateY(28px) scale(1.06);}}
    body.yes-mode .blob-1{background:radial-gradient(circle,#ff60a0,#ff90c0);}
    body.yes-mode .blob-2{background:radial-gradient(circle,#ff80b8,#ffb0d0);}
    body.yes-mode .blob-3{background:radial-gradient(circle,#ffaad0,#ffd8ec);}
    body.no-mode  .blob-1{background:radial-gradient(circle,#6a0000,#2a0000);}
    body.no-mode  .blob-2{background:radial-gradient(circle,#800000,#300000);}
    body.no-mode  .blob-3{background:radial-gradient(circle,#500000,#180000);}

    .ground{
      position:absolute;bottom:0;left:0;right:0;height:180px;
      background:linear-gradient(to top,rgba(60,20,80,0.55),transparent);
      pointer-events:none;transition:background 1.2s;
    }
    body.yes-mode .ground{background:linear-gradient(to top,rgba(255,100,160,0.3),transparent);}
    body.no-mode  .ground{background:linear-gradient(to top,rgba(120,0,0,0.5),transparent);}

    .floaty{
      position:absolute;pointer-events:none;
      animation:floatItem ease-in-out infinite alternate;
      display:flex;align-items:center;justify-content:center;
    }
    @keyframes floatItem{
      from{transform:translateY(0) rotate(var(--rf,-6deg));}
      to  {transform:translateY(-20px) rotate(var(--rt,6deg));}
    }
    .fi-1{top:8%; left:5%;  --rf:-8deg; --rt:4deg;  animation-duration:5.2s;}
    .fi-2{top:5%; right:7%; --rf:5deg;  --rt:-7deg; animation-duration:6.8s;animation-delay:.8s;}
    .fi-3{top:55%;left:3%;  --rf:-5deg; --rt:8deg;  animation-duration:4.6s;animation-delay:.3s;}
    .fi-4{top:12%;right:20%;--rf:-12deg;--rt:2deg;  animation-duration:7.4s;animation-delay:1.2s;}
    .fi-5{top:65%;right:4%; --rf:4deg;  --rt:-6deg; animation-duration:5.8s;animation-delay:.6s;}
    .fi-6{top:72%;left:18%; --rf:-6deg; --rt:5deg;  animation-duration:6.2s;animation-delay:1.5s;}
    .fi-7{top:20%;left:28%; --rf:3deg;  --rt:-8deg; animation-duration:4.9s;animation-delay:2s;}
    .fi-8{top:40%;right:2%; --rf:-4deg; --rt:9deg;  animation-duration:5.5s;animation-delay:.4s;}
    .poop-emoji{font-size:52px;line-height:1;}

    .card{
      position:relative;z-index:10;
      background:rgba(20,28,70,0.45);
      border:1.5px solid rgba(160,180,255,0.22);
      border-radius:28px;padding:48px 60px 44px;
      max-width:500px;width:90%;text-align:center;
      backdrop-filter:blur(22px) saturate(1.6);
      -webkit-backdrop-filter:blur(22px) saturate(1.6);
      box-shadow:0 24px 72px rgba(20,10,60,0.55),0 4px 20px rgba(160,140,255,0.1) inset;
      animation:cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
      transition:background 1.2s,border-color 1.2s,box-shadow 1.2s;
    }
    .card::before{
      content:'';position:absolute;inset:0;border-radius:28px;
      background:linear-gradient(145deg,rgba(180,160,255,0.12),rgba(255,255,255,0));
      pointer-events:none;transition:background 1.2s;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(36px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
    body.yes-mode .card{background:rgba(255,180,210,0.45);border-color:rgba(255,220,235,0.7);box-shadow:0 24px 72px rgba(255,100,160,0.3),0 4px 20px rgba(255,200,220,0.25) inset;}
    body.no-mode  .card{background:rgba(80,0,0,0.55);border-color:rgba(255,80,80,0.25);box-shadow:0 24px 72px rgba(180,0,0,0.5),0 4px 20px rgba(255,60,60,0.1) inset;}

    .cat-wrap{width:100px;height:100px;margin:0 auto 22px;animation:bobble 3.8s ease-in-out infinite;transition:filter 0.8s;}
    @keyframes bobble{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-8px) rotate(2deg);}}
    body.yes-mode .cat-wrap{filter:drop-shadow(0 0 16px rgba(255,100,160,0.7));}
    body.no-mode  .cat-wrap{filter:drop-shadow(0 0 16px rgba(255,50,50,0.6)) grayscale(0.5);}

    .question{font-size:28px;font-weight:700;color:#e8eeff;margin-bottom:8px;letter-spacing:-0.5px;text-shadow:0 2px 12px rgba(100,80,200,0.4);transition:color 0.8s,text-shadow 0.8s;}
    body.yes-mode .question{color:#8b003a;text-shadow:0 2px 16px rgba(255,100,160,0.4);}
    body.no-mode  .question{color:#ff6060;text-shadow:0 2px 16px rgba(255,0,0,0.4);}

    .subq{font-size:14px;color:#a0b4d8;margin-bottom:36px;opacity:0.85;transition:opacity 0.4s;}
    body.yes-mode .subq,.no-mode .subq{opacity:0;pointer-events:none;}

    .msg{display:none;margin-bottom:28px;}
    .msg-title{font-size:32px;font-weight:700;margin-bottom:6px;animation:popIn 0.5s cubic-bezier(0.22,1,0.36,1) both;}
    .msg-sub  {font-size:17px;font-weight:600;animation:popIn 0.5s 0.15s cubic-bezier(0.22,1,0.36,1) both;}
    @keyframes popIn{from{opacity:0;transform:scale(0.5) rotate(-8deg);}to{opacity:1;transform:scale(1) rotate(0deg);}}
    body.yes-mode .msg-yes{display:block;}
    body.no-mode  .msg-no {display:block;}
    .msg-yes .msg-title{color:#d0005a;}
    .msg-yes .msg-sub  {color:#e0306a;}
    .msg-no  .msg-title{color:#ff4040;}
    .msg-no  .msg-sub  {color:#ff6060;}

    .btn-row{display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap;transition:opacity 0.5s;}
    body.yes-mode .btn-row,body.no-mode .btn-row{opacity:0;pointer-events:none;}

    .btn-yes{
      padding:13px 34px;border-radius:50px;font-size:16px;font-weight:700;
      cursor:pointer;border:none;
      background:linear-gradient(140deg,#ff70b0,#e0106a);color:#fff;
      box-shadow:0 6px 24px rgba(220,20,100,0.45),0 1px 4px rgba(255,255,255,0.3) inset;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    .btn-yes:hover{transform:scale(1.08);box-shadow:0 10px 32px rgba(220,20,100,0.6);}

    .btn-no{
      padding:13px 34px;border-radius:50px;font-size:16px;font-weight:700;
      cursor:pointer;border:1.5px solid rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);
      backdrop-filter:blur(8px);transition:transform 0.15s;
    }
    .btn-no:hover{transform:scale(1.05);}

    #fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:20;}
  </style>
</head>

  <script>
    (function(){
      const c=document.getElementById('stars'),ctx=c.getContext('2d');
      function resize(){c.width=innerWidth;c.height=innerHeight;draw();}
      function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        for(let i=0;i<220;i++){
          const rng=(n,s)=>Math.abs(Math.sin(n*127.1+s*311.7)*43758.5453)%1;
          ctx.beginPath();ctx.arc(rng(i,0)*c.width,rng(i,1)*c.height,rng(i,2)*1.4+0.2,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,255,240,${rng(i,3)*0.65+0.3})`;ctx.fill();
        }
      }
      window.addEventListener('resize',resize);resize();
    })();

    (function(){
      const c=document.getElementById('petals'),ctx=c.getContext('2d');
      function resize(){c.width=innerWidth;c.height=innerHeight;}
      window.addEventListener('resize',resize);resize();
      function np(top){return{x:Math.random()*innerWidth,y:top?-14:Math.random()*innerHeight,
        sz:Math.random()*7+5,vy:Math.random()*0.9+0.35,vx:(Math.random()-0.5)*0.5,
        ang:Math.random()*Math.PI*2,spin:(Math.random()-0.5)*0.028,
        sw:Math.random()*2.5+0.8,swspd:Math.random()*0.018+0.006,
        swoff:Math.random()*Math.PI*2,op:Math.random()*0.45+0.4,hue:Math.random()*18};}
      const pts=Array.from({length:42},()=>np(false));let f=0;
      function dp(p){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.ang);ctx.globalAlpha=p.op;
        ctx.beginPath();ctx.ellipse(0,-p.sz*.28,p.sz*.38,p.sz*.7,0,0,Math.PI*2);
        ctx.fillStyle=`hsl(${340+p.hue},88%,80%)`;ctx.fill();
        ctx.beginPath();ctx.ellipse(0,-p.sz*.28,p.sz*.2,p.sz*.52,0,0,Math.PI*2);
        ctx.fillStyle=`hsl(${340+p.hue},80%,93%)`;ctx.globalAlpha=p.op*.55;ctx.fill();
        ctx.restore();
      }
      (function tick(){
        ctx.clearRect(0,0,c.width,c.height);f++;
        pts.forEach((p,i)=>{p.y+=p.vy;p.x+=p.vx+Math.sin(f*p.swspd+p.swoff)*p.sw*.07;p.ang+=p.spin;
          if(p.y>innerHeight+18)pts[i]=np(true);dp(p);});
        requestAnimationFrame(tick);
      })();
    })();

    (function(){
      const c=document.getElementById('fx-canvas'),ctx=c.getContext('2d');
      let mode=null,particles=[],running=false;
      function resize(){c.width=innerWidth;c.height=innerHeight;}
      window.addEventListener('resize',resize);resize();
      function newHeart(){return{x:Math.random()*innerWidth,y:innerHeight+20,
        sz:Math.random()*22+10,vy:Math.random()*2+1.5,vx:(Math.random()-0.5)*1.2,
        op:Math.random()*.5+.5,hue:Math.random()*30,t:'heart'};}
      function newPoop(){return{x:Math.random()*innerWidth,y:-50,
        sz:Math.random()*26+18,vy:Math.random()*2+1,vx:(Math.random()-.5)*.8,
        op:.9,rot:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.04,t:'poop'};}
      function drawHeart(p){
        ctx.save();ctx.translate(p.x,p.y);ctx.globalAlpha=p.op;
        const s=p.sz;ctx.beginPath();ctx.moveTo(0,-s*.3);
        ctx.bezierCurveTo(s*.5,-s*.9,s,-s*.2,0,s*.5);
        ctx.bezierCurveTo(-s,-s*.2,-s*.5,-s*.9,0,-s*.3);
        ctx.fillStyle=`hsl(${340+p.hue},90%,65%)`;ctx.fill();ctx.restore();
      }
      function drawPoop(p){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.op;
        ctx.font=p.sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('💩',0,0);ctx.restore();
      }
      (function tick(){
        requestAnimationFrame(tick);
        if(!running)return;
        ctx.clearRect(0,0,c.width,c.height);
        if(mode==='yes'&&Math.random()<.3)particles.push(newHeart());
        if(mode==='no' &&Math.random()<.4)particles.push(newPoop());
        particles.forEach(p=>{
          if(p.t==='heart'){p.y-=p.vy;p.x+=p.vx;p.op-=.004;drawHeart(p);}
          else{p.y+=p.vy;p.x+=p.vx;p.rot+=p.spin;drawPoop(p);}
        });
        particles=particles.filter(p=>p.op>0&&p.y>-100&&p.y<innerHeight+100);
      })();
      window.startFX=function(m){mode=m;running=true;};
    })();

    function sayYes(){
      document.body.classList.add('yes-mode');
      window.startFX('yes');
    }
    function sayNo(){
      document.body.classList.add('no-mode');
      for(let i=1;i<=8;i++){
        const el=document.getElementById('fi'+i);
        if(el)el.innerHTML='<span class="poop-emoji">💩</span>';
      }
      window.startFX('no');
    }
  </script>
</body>
</html>
