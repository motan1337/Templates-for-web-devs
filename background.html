  <style>
    :root {
      --sky-top: #04060f;
      --sky-mid: #0a0e24;
      --sky-bottom: #12183a;
      --glass-bg: rgba(20,28,70,0.45);
      --glass-border: rgba(160,180,255,0.22);
      --glass-shadow: rgba(80,100,200,0.22);
      --accent-blue: #7ab4f8;
      --accent-teal: #34c8b0;
      --text-dark: #e8eeff;
      --text-mid: #a0b4d8;
      --leaf: #6dda8e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', 'Trebuchet MS', Tahoma, sans-serif;
      background: linear-gradient(170deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
      overflow: hidden;
      position: relative;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      animation: drift linear infinite alternate;
      pointer-events: none;
    }
    .blob-1 { width: 420px; height: 420px; top: -80px; left: -80px; background: radial-gradient(circle, #1a1060 0%, #08063a 100%); animation-duration: 14s; }
    .blob-2 { width: 280px; height: 280px; bottom: -60px; right: 60px; background: radial-gradient(circle, #2a1050 0%, #0e0828 100%); animation-duration: 11s; }
    .blob-3 { width: 180px; height: 180px; top: 30%; right: 12%; background: radial-gradient(circle, #18306a 0%, #0a1838 100%); animation-duration: 17s; }
    @keyframes drift { from { transform: translateY(0) scale(1); } to { transform: translateY(28px) scale(1.06); } }

    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: linear-gradient(to top, rgba(60,20,80,0.55) 0%, transparent 100%);
      pointer-events: none;
    }

    .floaty {
      position: absolute;
      pointer-events: none;
      animation: floatItem ease-in-out infinite alternate;
    }
    @keyframes floatItem {
      from { transform: translateY(0) rotate(var(--rot-from, -6deg)); }
      to   { transform: translateY(-20px) rotate(var(--rot-to, 6deg)); }
    }
    .fi-lasagna  { top: 8%;  left: 5%;   --rot-from:-8deg;  --rot-to:4deg;   animation-duration:5.2s; }
    .fi-pizza    { top: 5%;  right: 7%;  --rot-from:5deg;   --rot-to:-7deg;  animation-duration:6.8s; animation-delay:.8s; }
    .fi-fries    { top: 55%; left: 3%;   --rot-from:-5deg;  --rot-to:8deg;   animation-duration:4.6s; animation-delay:.3s; }
    .fi-awp      { top: 12%; right: 20%; --rot-from:-12deg; --rot-to:2deg;   animation-duration:7.4s; animation-delay:1.2s; }
    .fi-cat-pink { top: 65%; right: 4%;  --rot-from:4deg;   --rot-to:-6deg;  animation-duration:5.8s; animation-delay:.6s; }
    .fi-cat-blue { top: 72%; left: 18%;  --rot-from:-6deg;  --rot-to:5deg;   animation-duration:6.2s; animation-delay:1.5s; }
    .fi-cat-grn  { top: 20%; left: 28%;  --rot-from:3deg;   --rot-to:-8deg;  animation-duration:4.9s; animation-delay:2s; }
    .fi-cat-pur  { top: 40%; right: 2%;  --rot-from:-4deg;  --rot-to:9deg;   animation-duration:5.5s; animation-delay:.4s; }

    .leaf {
      position: absolute;
      width: 34px; height: 52px;
      border-radius: 0 60% 0 60%;
      background: transparent;
      box-shadow: none;
      pointer-events: none;
      animation: sway ease-in-out 6s infinite alternate;
    }
    .leaf-1 { bottom: 90px; left: 7%; transform: rotate(-30deg); animation-delay: 0s; }
    .leaf-2 { bottom: 70px; right: 9%; transform: rotate(25deg) scaleX(-1); animation-delay: 1.5s; }
    .leaf-3 { bottom: 120px; left: 22%; transform: rotate(-18deg) scale(0.7); animation-delay: 0.8s; }
    @keyframes sway { from { transform: rotate(-30deg); } to { transform: rotate(-22deg) translateY(-6px); } }
    @keyframes cardIn {
    to   { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 1; transform: scale(1);   }
    50%      { transform: translateY(-8px) rotate(2deg); }
    50%      { box-shadow: 0 0 0 5px rgba(240,160,48,0.08); }
    to   { transform: translateX(calc(100vw + 160px)); }
    }

<style>
</style>

<!-- 1 2 3 asta e bazooka -->
<canvas id="stars" style="position:absolute;inset:0;pointer-events:none;z-index:1;width:100%;height:100%;"></canvas>
<!-- pestele sageata -->
<canvas id="petals" style="position:absolute;inset:0;pointer-events:none;z-index:2;width:100%;height:100%;"></canvas>

<script>
(function(){
  /* ── pisica propan ── */
  const sc = document.getElementById('stars');
  const sx = sc.getContext('2d');
  function resizeStars(){ sc.width=innerWidth; sc.height=innerHeight; drawStars(); }
  function drawStars(){
    sx.clearRect(0,0,sc.width,sc.height);
    for(let i=0;i<220;i++){
      const rng=(n,s)=>Math.abs(Math.sin(n*127.1+s*311.7)*43758.5453)%1;
      const x=rng(i,0)*sc.width, y=rng(i,1)*sc.height;
      const r=rng(i,2)*1.4+0.2, a=rng(i,3)*0.65+0.3;
      sx.beginPath(); sx.arc(x,y,r,0,Math.PI*2);
      sx.fillStyle=`rgba(255,255,240,${a})`; sx.fill();
    }
  }
  window.addEventListener('resize',resizeStars); resizeStars();

  const pc=document.getElementById('petals');
  const px=pc.getContext('2d');
  const N=42;
  function resizePetals(){ pc.width=innerWidth; pc.height=innerHeight; }
  window.addEventListener('resize',resizePetals); resizePetals();

  function newPetal(fromTop){
    return {
      x: Math.random()*innerWidth,
      y: fromTop ? -14 : Math.random()*innerHeight,
      sz: Math.random()*7+5,
      vy: Math.random()*0.9+0.35,
      vx: (Math.random()-0.5)*0.5,
      ang: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.028,
      sw: Math.random()*2.5+0.8,
      swspd: Math.random()*0.018+0.006,
      swoff: Math.random()*Math.PI*2,
      op: Math.random()*0.45+0.4,
      hue: Math.random()*18,
    };
  }
  const petals=Array.from({length:N},()=>newPetal(false));
  let f=0;

  function drawPetal(p){
    px.save();
    px.translate(p.x,p.y); px.rotate(p.ang);
    px.globalAlpha=p.op;
    const s=p.sz;
    px.beginPath();
    px.ellipse(0,-s*0.28,s*0.38,s*0.7,0,0,Math.PI*2);
    px.fillStyle=`hsl(${340+p.hue},88%,80%)`; px.fill();
    px.beginPath();
    px.ellipse(0,-s*0.28,s*0.2,s*0.52,0,0,Math.PI*2);
    px.fillStyle=`hsl(${340+p.hue},80%,93%)`; px.globalAlpha=p.op*0.55; px.fill();
    px.restore();
  }

  function tick(){
    px.clearRect(0,0,pc.width,pc.height); f++;
    petals.forEach((p,i)=>{
      p.y+=p.vy; p.x+=p.vx+Math.sin(f*p.swspd+p.swoff)*p.sw*0.07; p.ang+=p.spin;
      if(p.y>innerHeight+18) petals[i]=newPetal(true);
      drawPetal(p);
    });
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
