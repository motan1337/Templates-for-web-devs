<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Animated night-garden background"/>
  <title>insert text</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --sky-top: #04060f;
      --sky-mid: #0a0e24;
      --sky-bottom: #12183a;
      --glass-bg: rgba(20,28,70,0.45);
      --glass-border: rgba(160,180,255,0.22);
      --glass-shadow: rgba(80,100,200,0.22);
      --accent-blue: #7ab4f8;
      --accent-teal: #34c8b0;
      --text-dark: #e8eeff;
      --text-mid: #a0b4d8;
      --leaf: #6dda8e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', 'Segoe UI', 'Trebuchet MS', Tahoma, sans-serif;
      background: linear-gradient(170deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      animation: drift linear infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 420px; height: 420px; top: -80px; left: -80px; background: radial-gradient(circle, #1a1060 0%, #08063a 100%); animation-duration: 14s; }
    .blob-2 { width: 280px; height: 280px; bottom: -60px; right: 60px; background: radial-gradient(circle, #2a1050 0%, #0e0828 100%); animation-duration: 11s; }
    .blob-3 { width: 180px; height: 180px; top: 30%; right: 12%; background: radial-gradient(circle, #18306a 0%, #0a1838 100%); animation-duration: 17s; }
    @keyframes drift { from { transform: translateY(0) scale(1); } to { transform: translateY(28px) scale(1.06); } }

    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: linear-gradient(to top, rgba(60,20,80,0.55) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .floaty {
      position: absolute;
      pointer-events: none;
      z-index: 3;
      animation: floatItem ease-in-out infinite alternate;
    }
    @keyframes floatItem {
      from { transform: translateY(0) rotate(var(--rot-from, -6deg)); }
      to   { transform: translateY(-20px) rotate(var(--rot-to, 6deg)); }
    }
    .fi-lasagna    { top: 8%;  left: 5%;   --rot-from:-8deg;  --rot-to:4deg;   animation-duration:5.2s; }
    .fi-pizza      { top: 5%;  right: 7%;  --rot-from:5deg;   --rot-to:-7deg;  animation-duration:6.8s; animation-delay:.8s; }
    .fi-fries      { top: 55%; left: 3%;   --rot-from:-5deg;  --rot-to:8deg;   animation-duration:4.6s; animation-delay:.3s; }
    .fi-awp        { top: 12%; right: 20%; --rot-from:-12deg; --rot-to:2deg;   animation-duration:7.4s; animation-delay:1.2s; }
    .fi-cat-pink   { top: 65%; right: 4%;  --rot-from:4deg;   --rot-to:-6deg;  animation-duration:5.8s; animation-delay:.6s; }
    .fi-cat-blue   { top: 72%; left: 18%;  --rot-from:-6deg;  --rot-to:5deg;   animation-duration:6.2s; animation-delay:1.5s; }
    .fi-cat-grn    { top: 20%; left: 28%;  --rot-from:3deg;   --rot-to:-8deg;  animation-duration:4.9s; animation-delay:2s; }
    .fi-cat-pur    { top: 40%; right: 2%;  --rot-from:-4deg;  --rot-to:9deg;   animation-duration:5.5s; animation-delay:.4s; }
    .fi-cat-orange { top: 82%; left: 42%; --rot-from:-3deg;  --rot-to:6deg;   animation-duration:5.4s; animation-delay:.7s; }
    .fi-cat-or2    { top: 25%; left: 55%; --rot-from:-4deg;  --rot-to:7deg;   animation-duration:5.6s; animation-delay:.5s; }
    .fi-cat-or3    { top: 42%; left: 48%; --rot-from:5deg;   --rot-to:-3deg;  animation-duration:4.8s; animation-delay:1.4s; }
    .fi-cat-or4    { top: 62%; left: 50%; --rot-from:-2deg;  --rot-to:6deg;   animation-duration:6.0s; animation-delay:.3s; }
    .fi-cat-or5    { top: 8%;  left: 62%; --rot-from:7deg;   --rot-to:-5deg;  animation-duration:4.4s; animation-delay:1.9s; }
    .fi-cat-yel    { top: 14%; left: 48%; --rot-from:-7deg;  --rot-to:4deg;   animation-duration:4.7s; animation-delay:.4s; }
    .fi-cat-red    { top: 32%; left: 60%; --rot-from:5deg;   --rot-to:-4deg;  animation-duration:5.9s; animation-delay:1.8s; }
    .fi-cat-cyan   { top: 50%; left: 32%; --rot-from:-2deg;  --rot-to:8deg;   animation-duration:6.4s; animation-delay:.9s; }
    .fi-cat-blk    { top: 88%; right: 25%; --rot-from:6deg;  --rot-to:-3deg;  animation-duration:5.1s; animation-delay:2.2s; }
    .fi-cat-brn    { top: 58%; left: 68%; --rot-from:-5deg;  --rot-to:7deg;   animation-duration:5.7s; animation-delay:1.1s; }

    .leaf {
      position: absolute;
      width: 34px; height: 52px;
      border-radius: 0 60% 0 60%;
      background: linear-gradient(135deg, var(--leaf) 0%, #3aa860 100%);
      box-shadow: 0 4px 12px rgba(40,120,60,0.35), inset -6px -6px 12px rgba(0,0,0,0.15);
      pointer-events: none;
      z-index: 1;
      animation: sway ease-in-out 6s infinite alternate;
    }
    .leaf::before {
      content: '';
      position: absolute;
      top: 8%; left: 50%;
      width: 1.5px; height: 80%;
      background: rgba(255,255,255,0.25);
      transform: translateX(-50%) rotate(8deg);
    }
    .leaf-1 { bottom: 90px; left: 7%;  transform: rotate(-30deg); animation-delay: 0s; }
    .leaf-2 { bottom: 70px; right: 9%; transform: rotate(25deg) scaleX(-1); animation-delay: 1.5s; }
    .leaf-3 { bottom: 120px; left: 22%; transform: rotate(-18deg) scale(0.7); animation-delay: 0.8s; }
    @keyframes sway { from { transform: rotate(-30deg); } to { transform: rotate(-22deg) translateY(-6px); } }


    .cloud {
      position: absolute;
      pointer-events: none;
      opacity: 0.18;
      filter: blur(2px);
      z-index: 1;
      animation: cloudDrift linear infinite;
    }
    .cloud svg { display: block; }
    .cloud-1 { top: 12%; left: -160px; animation-duration: 38s; }
    .cloud-2 { top: 32%; right: -180px; animation-duration: 52s; animation-direction: reverse; }
    @keyframes cloudDrift {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(100vw + 320px)); }
    }

    .fx-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #stars  { z-index: 1; }
    #petals { z-index: 2; }

    @media (max-width: 520px) {
      .fi-cat-grn, .fi-cat-pur, .fi-fries,
      .fi-cat-yel, .fi-cat-cyan, .fi-cat-brn,
      .fi-cat-or3, .fi-cat-or5 { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

  <canvas id="stars"  class="fx-canvas" aria-hidden="true"></canvas>
  <canvas id="petals" class="fx-canvas" aria-hidden="true"></canvas>

  <script>
  (function () {
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    const sc = document.getElementById('stars');
    const sx = sc.getContext('2d');
    const STAR_COUNT = 220;
    let stars = [];

    function resizeStars() {
      sc.width  = innerWidth  * dpr;
      sc.height = innerHeight * dpr;
      sc.style.width  = innerWidth  + 'px';
      sc.style.height = innerHeight + 'px';
      sx.setTransform(dpr, 0, 0, dpr, 0, 0);

      stars = [];
      const rng = (n, s) => Math.abs(Math.sin(n * 127.1 + s * 311.7) * 43758.5453) % 1;
      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
          x: rng(i, 0) * innerWidth,
          y: rng(i, 1) * innerHeight,
          r: rng(i, 2) * 1.4 + 0.2,
          baseA: rng(i, 3) * 0.55 + 0.3,
          phase: rng(i, 4) * Math.PI * 2,
          speed: rng(i, 5) * 0.025 + 0.008,
        });
      }
    }
    function drawStars(t) {
      sx.clearRect(0, 0, innerWidth, innerHeight);
      for (const s of stars) {
        const a = s.baseA + Math.sin(t * s.speed + s.phase) * 0.25;
        sx.beginPath();
        sx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sx.fillStyle = `rgba(255,255,240,${Math.max(0.05, a)})`;
        sx.fill();
      }
    }

    const pc = document.getElementById('petals');
    const px = pc.getContext('2d');
    const PETAL_COUNT = 42;
    let petals = [];

    function newPetal(fromTop) {
      return {
        x: Math.random() * innerWidth,
        y: fromTop ? -14 : Math.random() * innerHeight,
        sz: Math.random() * 7 + 5,
        vy: Math.random() * 0.9 + 0.35,
        vx: (Math.random() - 0.5) * 0.5,
        ang: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.028,
        sw: Math.random() * 2.5 + 0.8,
        swspd: Math.random() * 0.018 + 0.006,
        swoff: Math.random() * Math.PI * 2,
        op: Math.random() * 0.45 + 0.4,
        hue: Math.random() * 18,
      };
    }
    function resizePetals() {
      pc.width  = innerWidth  * dpr;
      pc.height = innerHeight * dpr;
      pc.style.width  = innerWidth  + 'px';
      pc.style.height = innerHeight + 'px';
      px.setTransform(dpr, 0, 0, dpr, 0, 0);
      for (const p of petals) {
        if (p.x > innerWidth)  p.x = Math.random() * innerWidth;
        if (p.y > innerHeight) p.y = Math.random() * innerHeight;
      }
    }
    function initPetals() {
      petals = Array.from({ length: PETAL_COUNT }, () => newPetal(false));
    }
    function drawPetal(p) {
      px.save();
      px.translate(p.x, p.y);
      px.rotate(p.ang);
      px.globalAlpha = p.op;
      const s = p.sz;
      px.beginPath();
      px.ellipse(0, -s * 0.28, s * 0.38, s * 0.7, 0, 0, Math.PI * 2);
      px.fillStyle = `hsl(${340 + p.hue},88%,80%)`;
      px.fill();
      px.beginPath();
      px.ellipse(0, -s * 0.28, s * 0.2, s * 0.52, 0, 0, Math.PI * 2);
      px.fillStyle = `hsl(${340 + p.hue},80%,93%)`;
      px.globalAlpha = p.op * 0.55;
      px.fill();
      px.restore();
    }

    let frame = 0;
    function tick() {
      frame++;
      drawStars(frame);

      px.clearRect(0, 0, innerWidth, innerHeight);
      for (let i = 0; i < petals.length; i++) {
        const p = petals[i];
        p.y += p.vy;
        p.x += p.vx + Math.sin(frame * p.swspd + p.swoff) * p.sw * 0.07;
        p.ang += p.spin;
        if (p.y > innerHeight + 18 || p.x < -20 || p.x > innerWidth + 20) {
          petals[i] = newPetal(true);
        }
        drawPetal(petals[i]);
      }
      requestAnimationFrame(tick);
    }

    resizeStars();
    resizePetals();
    initPetals();

    if (reduceMotion) {
      drawStars(0);
    } else {
      requestAnimationFrame(tick);
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        resizeStars();
        resizePetals();
        if (reduceMotion) drawStars(0);
      }, 120);
    });
  })();
  </script>

</body>
